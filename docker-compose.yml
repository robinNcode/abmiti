version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: abmiti-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: abmiti

  server:
    build: ./server
    container_name: abmiti-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: ./server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/abmiti
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: abmiti-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
