<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offline — Abmiti</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAF8F5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .card {
    text-align: center;
    max-width: 320px;
  }
  .icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(191, 96, 70, 0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 36px;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #1A1309;
    margin-bottom: 12px;
  }
  p {
    font-size: 14px;
    color: #7A6A56;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  button {
    background: #BF6046;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>No Internet Connection</h1>
  <p>Abmiti needs an internet connection to load your financial data. Please check your network settings and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
