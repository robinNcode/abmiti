name: abmiti
description: "Abmiti - Personal Finance Tracker. A Flutter WebView wrapper for the Abmiti web application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebView
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.13.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Splash screen & icons (also in dev_dependencies for tooling)
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

  # URL launcher for external links
  url_launcher: ^6.3.0

  # Cupertino icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1
  flutter_launcher_icons: ^0.14.1

# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#C2552A"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# Flutter Native Splash configuration
flutter_native_splash:
  color: "#C2552A"
  image: assets/splash/logo.png
  color_dark: "#9A3D1A"
  image_dark: assets/splash/logo.png
  android_12:
    color: "#C2552A"
    icon_background_color: "#C2552A"
    image: assets/splash/logo.png
    color_dark: "#9A3D1A"
    icon_background_color_dark: "#9A3D1A"
    image_dark: assets/splash/logo.png
  fullscreen: true
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/splash/
