server {
    listen 80;
    server_name localhost;

    location /abmiti/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /abmiti/index.html;
    }

    # Redirect root / to /abmiti/
    location = / {
        return 301 /abmiti/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
